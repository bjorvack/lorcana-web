name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@bjorvack"

      - run: pnpm install --frozen-lockfile
        env:
          # `@bjorvack/lorcana-schemas` is published to GitHub Packages;
          # the `.npmrc` reads this env var.
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Materialise `src/data/cards.json` + `cards.meta.ts` before
      # the lint / typecheck / test steps that import them. The
      # plugin is otherwise wired into `vite build`, but that runs
      # *after* typecheck on purpose — we don't want to bundle a
      # codebase that doesn't even compile.
      - run: pnpm prefetch:cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # Full build, exercises the plugin path as well.
      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
