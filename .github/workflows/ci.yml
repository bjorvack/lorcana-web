name: ci

on:
  push:
    branches: [main]
  pull_request:

# Silence the "Node.js 20 actions are deprecated" warning emitted
# for the bundled JavaScript actions (actions/checkout, actions/cache,
# pnpm/action-setup, …). Forces those actions to run on the runner's
# Node 24 ahead of GitHub making it the default in June 2026.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@bjorvack"

      - run: pnpm install --frozen-lockfile
        env:
          # `@bjorvack/lorcana-schemas` is published to GitHub Packages;
          # the `.npmrc` reads this env var.
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      # Materialise `src/data/cards.json` + `cards.meta.ts` before
      # the lint / typecheck / test steps that import them. The
      # plugin is otherwise wired into `vite build`, but that runs
      # *after* typecheck on purpose — we don't want to bundle a
      # codebase that doesn't even compile.
      - run: pnpm prefetch:cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Same idea: the runtime model code imports
      # `src/data/model.meta.ts`, which is generated by the
      # fetch-model plugin (normally during `vite build`). typecheck
      # would otherwise fail with TS2307 because the file doesn't
      # exist on a fresh checkout. A `null` MODEL_RELEASE_TAG makes
      # the script a no-op, which still satisfies any optional-import
      # paths in the source.
      - run: pnpm prefetch:model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test

      # Full build, exercises the plugin path as well.
      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    # AI Generate-flow smoke test. Kept in its own job so a
    # Playwright outage doesn't gate every lint + typecheck push.
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: "@bjorvack"

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      # Same prefetch dance the test job runs — the model bundle has
      # to land under public/model/ before vite preview can serve it.
      - run: pnpm prefetch:cards
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm prefetch:model
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: pnpm exec playwright install --with-deps chromium

      # Start the preview server in the background; the test config
      # picks it up via E2E_BASE_URL so Playwright doesn't try to
      # manage it itself.
      - name: Start preview server
        run: |
          pnpm preview --host --port 4173 &
          echo $! > .preview.pid
          for i in {1..30}; do
            if curl -sf http://localhost:4173/ >/dev/null; then break; fi
            sleep 1
          done

      - name: Run E2E
        env:
          E2E_BASE_URL: http://localhost:4173/
        run: pnpm test:e2e

      - name: Stop preview server
        if: always()
        run: |
          if [ -f .preview.pid ]; then
            kill "$(cat .preview.pid)" || true
          fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
